packages:
  - packages/*
  - apps/*
  - examples/*
  - docs
  - docs-mintlify
  - sdks/*
  - sdks/implementations/*

minimumReleaseAge: 10080

blockExoticSubdeps: true

overrides:
  '@types/react': 19.2.7
  '@types/react-dom': 19.2.3
  sharp: ^0.34.5
  # Pin rolldown to 1.1.2 until 1.1.3 passes the 7-day minimumReleaseAge policy (after Jul 1 2026).
  # tsdown ~1.1.1 resolves to 1.1.3 by default, which was published Jun 24.
  rolldown: 1.1.2
  '@napi-rs/wasm-runtime': 1.1.5

packageExtensions:
  '@mintlify/link-rot':
    dependencies:
      react: '*'
      react-dom: '*'

patchedDependencies:
  openid-client@5.6.4: patches/openid-client@5.6.4.patch

allowBuilds:
  '@prisma/engines': true
  '@quetzallabs/i18n': false
  '@scarf/scarf': false
  '@sentry/cli': true
  '@tailwindcss/oxide': true
  '@vercel/speed-insights': true
  bcrypt: true
  codebuff: false
  core-js: true
  esbuild: true
  iframe-resizer: false
  keytar: false
  prisma: true
  protobufjs: true
  puppeteer: true
  sharp: true
  unrs-resolver: false
